<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}exoverse{% endblock %}</title>
<style>
:root {
  --surface-1: #fcfcfb; --page: #f9f9f7;
  --text-primary: #0b0b0b; --text-secondary: #52514e; --muted: #898781;
  --grid: #e1e0d9; --axis: #c3c2b7; --border: rgba(11,11,11,0.10);
  --series-1: #2a78d6; --series-2: #1baf7a; --series-3: #eda100;
  --series-4: #008300; --series-5: #4a3aa7; --series-6: #e34948;
  --good: #0ca30c; --warning: #fab219; --critical: #d03b3b;
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface-1: #1a1a19; --page: #0d0d0d;
    --text-primary: #ffffff; --text-secondary: #c3c2b7; --muted: #898781;
    --grid: #2c2c2a; --axis: #383835; --border: rgba(255,255,255,0.10);
    --series-1: #3987e5; --series-2: #199e70; --series-3: #c98500;
    --series-4: #008300; --series-5: #9085e9; --series-6: #e66767;
  }
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--page); color: var(--text-primary);
  font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif; }
nav { display: flex; gap: 4px; align-items: baseline; padding: 12px 24px;
  border-bottom: 1px solid var(--border); background: var(--surface-1);
  flex-wrap: wrap; }
nav .brand { font-weight: 700; margin-right: 16px; }
nav a { color: var(--text-secondary); text-decoration: none;
  padding: 4px 10px; border-radius: 6px; }
nav a:hover { background: var(--page); color: var(--text-primary); }
nav a.active { color: var(--text-primary); font-weight: 600; }
main { max-width: 1060px; margin: 0 auto; padding: 24px; }
h1 { font-size: 22px; margin: 8px 0 4px; }
h2 { font-size: 17px; margin: 28px 0 8px; }
h3 { font-size: 15px; margin: 18px 0 6px; }
.muted { color: var(--muted); }
.small { font-size: 13px; }
.card { background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px; margin: 12px 0; overflow-x: auto; }
.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
  gap: 12px; margin: 16px 0; }
.tile { background: var(--surface-1); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; }
.tile .v { font-size: 26px; font-weight: 700; }
.tile .l { color: var(--text-secondary); font-size: 13px; }
table { border-collapse: collapse; width: 100%; font-size: 13.5px; }
th { text-align: left; color: var(--muted); font-weight: 500;
  border-bottom: 1px solid var(--axis); padding: 6px 10px 6px 0; }
td { border-bottom: 1px solid var(--grid); padding: 6px 10px 6px 0;
  font-variant-numeric: tabular-nums; }
tr:last-child td { border-bottom: none; }
a { color: var(--series-1); }
svg { width: 100%; height: auto; display: block; }
svg .grid { stroke: var(--grid); stroke-width: 1; }
svg .axis { stroke: var(--axis); stroke-width: 1; }
svg .tick { fill: var(--muted); font-size: 11.5px; }
svg .value { fill: var(--text-secondary); font-size: 12px; }
svg .axis-label { fill: var(--text-secondary); font-size: 12.5px; }
.badge { display: inline-block; padding: 1px 8px; border-radius: 999px;
  font-size: 12px; border: 1px solid var(--border);
  color: var(--text-secondary); }
.badge.det { border-color: var(--good); color: var(--good); font-weight: 600; }
.badge.hz { border-color: var(--series-2); color: var(--series-2); }
.flag-q { color: var(--critical); }
.flag-i { color: var(--muted); }
.legend { display: flex; gap: 18px; flex-wrap: wrap; margin: 6px 0;
  font-size: 13px; color: var(--text-secondary); }
.legend .sw { display: inline-block; width: 10px; height: 10px;
  border-radius: 999px; margin-right: 6px; vertical-align: -1px; }
#tip { position: fixed; pointer-events: none; z-index: 10; display: none;
  background: var(--text-primary); color: var(--surface-1);
  padding: 5px 9px; border-radius: 6px; font-size: 12.5px; max-width: 340px; }
.filters { display: flex; gap: 10px; margin: 10px 0; }
.filters a { border: 1px solid var(--border); border-radius: 999px;
  padding: 3px 12px; text-decoration: none; color: var(--text-secondary);
  font-size: 13px; }
.filters a.on { border-color: var(--series-1); color: var(--series-1);
  font-weight: 600; }
</style>
</head>
<body>
<nav>
  <span class="brand">exoverse</span>
  <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Dashboard</a>
  <a href="/systems" {% if request.path.startswith('/systems') %}class="active"{% endif %}>Systems</a>
  <a href="/validation" {% if request.path.startswith('/validation') %}class="active"{% endif %}>Validation</a>
  <a href="/about" {% if request.path.startswith('/about') %}class="active"{% endif %}>Methods</a>
</nav>
<main>{% block content %}{% endblock %}</main>
<div id="tip"></div>
<script>
const tip = document.getElementById('tip');
document.addEventListener('mousemove', (e) => {
  const el = e.target.closest('[data-tip]');
  if (el && el.dataset.tip) {
    tip.textContent = el.dataset.tip;
    tip.style.display = 'block';
    tip.style.left = Math.min(e.clientX + 14, window.innerWidth - 360) + 'px';
    tip.style.top = (e.clientY + 14) + 'px';
  } else { tip.style.display = 'none'; }
});
</script>
</body>
</html>
